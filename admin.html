<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم رواد للتقنية - احترافية</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-top: 30px; display: flex; justify-content: space-between; align-items: center; }
        
        /* قسم الإضافة */
        .add-box { background: #ecf0f1; padding: 20px; border-radius: 8px; border-right: 5px solid #3498db; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        
        /* الجداول */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fff; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #ddd; font-size: 14px; }
        th { background: #34495e; color: white; }
        tr:hover { background: #f9f9f9; }

        .status-ok { color: #27ae60; font-weight: bold; }
        .status-fail { color: #e74c3c; font-weight: bold; }
        
        /* الأزرار */
        .btn-add { background: #3498db; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; transition: 0.3s; }
        .btn-add:hover { background: #2980b9; }
        .btn-refresh { background: #2ecc71; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 14px; }
        
        .card { border: 1px solid #eee; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        
        <div class="card">
            <h2>➕ إضافة جواب جديد للداتابيس</h2>
            <div class="add-box">
                <input type="text" id="tag" placeholder="اسم التصنيف (مثلاً: اسعار_المواقع)">
                <input type="text" id="patterns" placeholder="الكلمات المفتاحية (افصل بينها بفاصلة)">
                <textarea id="response" rows="3" placeholder="الجواب الذي سيقوله البوت..."></textarea>
                <button class="btn-add" onclick="addData()">حفظ البيانات في MongoDB 💾</button>
            </div>
        </div>

        <div class="card" style="border-right: 5px solid #e67e22;">
            <h2>📩 طلبات الزبائن (Messages) 
                <button class="btn-refresh" onclick="loadMessages()">تحديث الطلبات 🔄</button>
            </h2>
            <table id="messagesTable">
                <thead>
                    <tr>
                        <th>الاسم</th>
                        <th>الإيميل</th>
                        <th>الرسالة</th>
                        <th>التاريخ</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="card" style="border-right: 5px solid #2ecc71;">
            <h2>🤖 سجل محادثات البوت (Chat Logs) 
                <button class="btn-refresh" onclick="loadLogs()">تحديث السجل 🔄</button>
            </h2>
            <table id="logsTable">
                <thead>
                    <tr>
                        <th>السؤال</th>
                        <th>الحالة</th>
                        <th>الوقت</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        // نظام الحماية
        const password = prompt("يرجى إدخال كلمة سر المدير للدخول:");
        if (password !== "ruwaad2026") {
            alert("كلمة سر خاطئة!");
            window.location.href = "index.html";
        }

        // 1. جلب رسائل الزبائن (Contact Form)
        async function loadMessages() {
            try {
                const response = await fetch('http://localhost:3000/api/admin/messages');
                const messages = await response.json();
                const tbody = document.querySelector('#messagesTable tbody');
                tbody.innerHTML = '';

                messages.forEach(msg => {
                    tbody.innerHTML += `<tr>
                        <td><b>${msg.name}</b></td>
                        <td>${msg.email}</td>
                        <td>${msg.message}</td>
                        <td>${new Date(msg.date).toLocaleString('ar-EG')}</td>
                    </tr>`;
                });
            } catch (err) { console.error("خطأ في جلب الرسائل"); }
        }

        // 2. جلب سجلات الشات
        async function loadLogs() {
            try {
                const response = await fetch('http://localhost:3000/api/admin/logs');
                const logs = await response.json();
                const tbody = document.querySelector('#logsTable tbody');
                tbody.innerHTML = '';

                logs.forEach(log => {
                    tbody.innerHTML += `<tr>
                        <td>${log.query}</td>
                        <td class="${log.hasAnswer ? 'status-ok' : 'status-fail'}">
                            ${log.hasAnswer ? '✅ تمت الإجابة' : '❌ لم يفهم'}
                        </td>
                        <td>${new Date(log.timestamp).toLocaleString('ar-EG')}</td>
                    </tr>`;
                });
            } catch (err) { console.error("خطأ في جلب السجلات"); }
        }

        // 3. إضافة بيانات للداتابيس
        async function addData() {
            const tag = document.getElementById('tag').value;
            const patternsRaw = document.getElementById('patterns').value;
            const responseText = document.getElementById('response').value;

            if(!tag || !patternsRaw || !responseText) return alert("يرجى ملء كافة الحقول!");

            const patterns = patternsRaw.split(',').map(p => p.trim());

            const res = await fetch('http://localhost:3000/api/admin/add-data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tag, patterns, response: responseText })
            });

            const data = await res.json();
            alert(data.message);
            document.getElementById('tag').value = '';
            document.getElementById('patterns').value = '';
            document.getElementById('response').value = '';
        }

        // تحميل كل شيء عند الفتح
        loadMessages();
        loadLogs();
    </script>
</body>
</html>
